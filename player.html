<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personnage — Le Royaume de Givre</title>

<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="player.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">

<script src="theme.js"></script>
<script src="player-data.js"></script>
<script src="player-tree.js"></script>
<script src="player-progression.js"></script>
</head>

<body>
<div class="player-container">

  <div class="top-nav">
    <a class="back-link" href="index.html">← Accueil</a>
    <button class="theme-toggle" onclick="toggleTheme()">☀ Thème clair</button>
  </div>

  <header class="player-header">
    <div class="player-label" id="player-label">Personnage</div>
    <h1 class="player-title" id="player-title">Nouveau personnage</h1>
    <div class="player-subtitle" id="player-subtitle">Feuille intégrée en construction</div>
  </header>

  <section class="player-panel compact-panel collapsible-panel" id="identity-panel">
    <button class="collapsible-header" type="button" onclick="toggleIdentityPanel()">
      <span>Configuration du personnage</span>
      <span class="collapsible-toggle">▾</span>
    </button>

    <div class="collapsible-content">
      <div class="form-grid">
        <div class="field-group">
          <label class="field-label" for="player-name">Prénom du joueur</label>
          <input class="sheet-input" id="player-name" type="text" placeholder="Prénom du joueur" autocomplete="off">
        </div>

        <div class="field-group">
          <label class="field-label" for="character-name">Nom du personnage</label>
          <input class="sheet-input" id="character-name" type="text" placeholder="Nom du personnage" autocomplete="off">
        </div>

        <div class="field-group full">
          <label class="field-label" for="class-select">Classe</label>
          <select class="sheet-select" id="class-select"></select>
        </div>
      </div>

      <div class="style-grid" id="style-grid"></div>
      <div class="class-preview" id="class-preview"></div>
      <div class="status-line" id="save-status"></div>
    </div>
  </section>

  <section class="player-panel sheet-section">
    <div class="panel-title">Niveau</div>
    <div class="level-bar" id="sheet-level-bar"></div>
    <div class="level-help">Cliquez sur une bille pour définir directement le niveau</div>
  </section>

  <section class="player-panel compact-panel collapsible-panel" id="progression-panel">
    <button class="collapsible-header" type="button" onclick="toggleProgressionPanel()">
      <span>Progression</span>
      <span class="collapsible-toggle">▾</span>
    </button>
    <div class="collapsible-content">
      <div class="progression-grid" id="progression-grid"></div>
    </div>
  </section>

  <section class="player-panel sheet-section">
    <div class="panel-title">Caractéristiques</div>
    <div class="carac-grid" id="sheet-carac-grid"></div>
  </section>

  <section class="player-panel sheet-section">
    <div class="panel-title">Points de vie</div>
    <div class="hearts-row" id="sheet-hearts-row"></div>
  </section>

  <section class="player-panel sheet-section">
    <div class="panel-title">Équipement</div>
    <div class="equipement-grid" id="sheet-equipement-grid"></div>
  </section>

  <section class="player-panel sheet-section">
    <div class="panel-title">Arbre de compétences</div>
    <div id="player-tree-root"></div>
  </section>

  <section class="player-panel sheet-section">
    <div class="panel-title">Inventaire</div>
    <div class="inventaire-grid" id="sheet-inventaire-grid"></div>
  </section>

  <section class="player-actions">
    <button class="sheet-action-btn" type="button" onclick="exportSaveFile()">Exporter la sauvegarde</button>
    <button class="sheet-action-btn" type="button" onclick="document.getElementById('save-import-input').click()">Importer une sauvegarde</button>
    <button class="sheet-action-btn danger" type="button" onclick="resetSheet()">Réinitialiser la feuille</button>
    <input id="save-import-input" type="file" accept="application/json,.json" hidden onchange="importSaveFile(event)">
  </section>

</div>

<script src="player-render-equipment.js"></script>
<script src="player.js"></script>
<script src="player-savefile.js"></script>
</body>
</html>
