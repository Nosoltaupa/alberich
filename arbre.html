<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbre de compétences</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="arbre.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<script src="theme.js"></script>
</head>
<body>
<div class="container">

  <div class="top-nav">
    <a class="back-link" id="back-link" href="index.html">← Toutes les classes</a>
    <button class="theme-toggle" onclick="toggleTheme()">☀ Thème clair</button>
  </div>

  <header class="header">
    <div class="class-label">Classe</div>
    <h1 class="class-title"><span id="class-article"></span> <span id="class-name"></span> <span class="class-level-badge" id="class-level"></span></h1>
    <p class="class-subtitle" id="class-subtitle"></p>
  </header>

  <div class="level-bar" id="level-bar"></div>

  <div class="save-bar">
    <button class="btn" onclick="exportSave()">⬇ Exporter</button>
    <label class="btn" for="import-input" style="cursor:pointer">⬆ Importer</label>
    <input type="file" id="import-input" accept=".json" onchange="importSave(this)">
    <span class="save-status" id="save-status"></span>
  </div>

  <div class="tree" id="tree"></div>

  <div class="ultimate-section">
    <div class="section-divider"><span>✦ Compétence ultime — Niveau 6 ✦</span></div>
    <div class="ultimate-card" id="ultimate-card" onclick="toggleUltimate()">
      <div class="ultimate-header">
        <div class="ultimate-gem">⚜️</div>
        <div class="ultimate-info">
          <div class="ultimate-title" id="ultimate-title"></div>
          <div class="ultimate-sub"   id="ultimate-sub"></div>
        </div>
        <div class="ultimate-toggle">▾</div>
      </div>
      <div class="ultimate-detail" id="ultimate-detail">
        <p class="ultimate-desc" id="ultimate-desc"></p>
        <div class="skill-actions" id="ultimate-actions"></div>
      </div>
    </div>
  </div>

  <div class="progression-section">
    <div class="section-divider"><span>✦ Progression par niveau ✦</span></div>
    <div class="prog-timeline" id="prog-timeline"></div>
  </div>

  <p class="footer-note">
    Cliquez sur une option de progression pour enregistrer le choix ·
    Cliquez sur une compétence pour lire sa description ·
    La compétence ultime se débloque au niveau&nbsp;6
  </p>

</div>

<script>
(function loadClassDataThenEngine() {
  const CLASSES_AUTORISEES = ['forgeron', 'mineur', 'trappeur', 'guerrier'];
  const params = new URLSearchParams(window.location.search);
  const classe = params.get('classe');

  if (!CLASSES_AUTORISEES.includes(classe)) {
    document.querySelector('.container').innerHTML = `
      <div class="top-nav">
        <a class="back-link" href="index.html">← Toutes les classes</a>
        <button class="theme-toggle" onclick="toggleTheme()">☀ Thème clair</button>
      </div>
      <header class="header">
        <div class="class-label">Erreur</div>
        <h1 class="class-title"><span>Classe inconnue</span></h1>
        <p class="class-subtitle">
          La classe demandée n'existe pas ou l'URL est incomplète.
        </p>
      </header>
    `;
    return;
  }

  const classScript = document.createElement('script');
  classScript.src = `${classe}/classe.js`;

  classScript.onload = () => {
    const engineScript = document.createElement('script');
    engineScript.src = 'arbre.js';
    document.body.appendChild(engineScript);
  };

  classScript.onerror = () => {
    document.querySelector('.container').innerHTML = `
      <div class="top-nav">
        <a class="back-link" href="index.html">← Toutes les classes</a>
        <button class="theme-toggle" onclick="toggleTheme()">☀ Thème clair</button>
      </div>
      <header class="header">
        <div class="class-label">Erreur</div>
        <h1 class="class-title"><span>Données introuvables</span></h1>
        <p class="class-subtitle">
          Impossible de charger le fichier ${classe}/classe.js.
        </p>
      </header>
    `;
  };

  document.body.appendChild(classScript);
})();
</script>
</body>
</html>
