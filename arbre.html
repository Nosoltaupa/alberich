<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbre de compétences</title>
<link rel="stylesheet" href="theme.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<style>
  /* Variables spécifiques à arbre.html */
  :root {
    --bg-ult:       #1c1710;
    --bg-ult-hdr:   #211c13;
    --bg-skill-on:  #1e1a15;
    --bg-skill-hdr: #231f19;
    --locked-text:  #4a4238;
    --prog-bg:      #161210;
    --prog-node:    #231f1a;
    --prog-done:    #2a2010;
  }
  [data-theme="light"] {
    --bg-ult:       #ede6d8;
    --bg-ult-hdr:   #e5dcc8;
    --bg-skill-on:  #e8e0d0;
    --bg-skill-hdr: #ddd4c0;
    --locked-text:  #b0a080;
    --prog-bg:      #ede6d8;
    --prog-node:    #e2d9c8;
    --prog-done:    #d8ceb0;
  }

  body { padding: 2rem 1.5rem 4rem; }
  .container { max-width: 820px; margin: 0 auto; position: relative; z-index: 1; }

  /* ---- En-tête ---- */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 1px;
    background: var(--ember);
  }
  .class-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .2em; color: var(--ember); text-transform: uppercase; margin-bottom: .6rem; }
  .class-title { font-family: 'Cinzel', serif; font-size: 2.4rem; font-weight: 700; letter-spacing: .05em; line-height: 1; }
  .class-title span { color: var(--gold); }
  .class-level-badge { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 400; color: var(--ember); letter-spacing: .1em; vertical-align: middle; opacity: .85; }
  .class-subtitle { margin-top: .7rem; color: var(--text-muted); font-size: 15px; font-style: italic; }

  /* ---- Barre de niveau ---- */
  .level-bar { display: flex; align-items: center; justify-content: center; gap: .5rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .level-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: .15em; color: var(--text-muted); text-transform: uppercase; margin-right: .4rem; }
  .level-pip { width: 28px; height: 6px; border-radius: 2px; background: var(--bg3); border: 1px solid var(--border); cursor: pointer; transition: background .2s, border-color .2s; }
  .level-pip.earned { background: var(--ember); border-color: var(--ember-light); }
  .level-pip:hover  { border-color: var(--ember-light); }
  .level-count { font-size: 13px; color: var(--text-muted); margin-left: .6rem; }
  .level-count strong { color: var(--ember-light); }

  /* ---- Barre de sauvegarde ---- */
  .save-bar { display: flex; align-items: center; justify-content: center; gap: .6rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .save-status { font-size: 11px; font-style: italic; color: var(--text-dim); min-width: 180px; text-align: center; }
  .save-status.ok   { color: var(--gold); }
  .save-status.warn { color: var(--ember-light); }
  #import-input { display: none; }

  /* ---- Boutons ---- */
  .btn { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; padding: 5px 12px; border-radius: 2px; cursor: pointer; border: 1px solid var(--border-light); background: transparent; color: var(--text-muted); transition: border-color .15s, color .15s, background .15s; }
  .btn:hover          { border-color: var(--ember); color: var(--ember-light); }
  .btn.primary        { background: var(--ember); border-color: var(--ember); color: #fff; }
  .btn.primary:hover  { background: var(--ember-light); border-color: var(--ember-light); }
  .btn:disabled       { opacity: .3; cursor: not-allowed; pointer-events: none; }
  .btn.revoke:hover   { border-color: #a04040; color: #c06060; }

  /* ---- Grille branches ---- */
  .tree { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 2rem; }
  .branch-col { display: flex; flex-direction: column; }
  .branch-header { text-align: center; padding: .8rem .5rem .7rem; border: 1px solid var(--border); border-radius: 4px 4px 0 0; background: var(--bg2); }
  .branch-icon-wrap { width: 36px; height: 36px; margin: 0 auto .4rem; border-radius: 3px; overflow: hidden; background: var(--bg3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .branch-icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .branch-name { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .1em; color: var(--gold); text-transform: uppercase; }

  .connector { display: flex; justify-content: center; }
  .connector svg line { stroke: var(--border-light); }
  .connector.locked svg line { stroke: var(--border); opacity: .5; }

  /* ---- Carte compétence ---- */
  .skill-card { border: 1px solid var(--border); border-radius: 0 0 4px 4px; background: var(--bg2); cursor: pointer; transition: border-color .2s; overflow: hidden; }
  .skill-card + .connector { margin-top: 0; }
  .connector + .skill-card { border-radius: 4px; }
  .skill-card:hover { border-color: var(--border-light); }
  .skill-card.unlocked { border-color: var(--ember); }
  .skill-card.locked-card { opacity: .6; }
  .skill-card.active-card { border-color: var(--ember-light); }

  .skill-header { display: flex; align-items: center; gap: .5rem; padding: .55rem .7rem; background: var(--bg3); }
  .skill-rank { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: .1em; color: var(--text-dim); text-transform: uppercase; white-space: nowrap; }
  .skill-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .skill-card.unlocked .skill-name { color: var(--ember-light); }
  .lock-icon { font-size: 10px; opacity: .6; }
  .skill-toggle { font-size: 12px; color: var(--text-dim); transition: transform .3s; }
  .skill-card.open .skill-toggle { transform: rotate(180deg); color: var(--ember); }

  .skill-detail { max-height: 0; overflow: hidden; padding: 0 .8rem; border-top: 0 solid transparent; transition: max-height .4s cubic-bezier(.4,0,.2,1), padding .3s; }
  .skill-detail.open { max-height: 300px; padding: .7rem .8rem .8rem; border-top: 1px solid var(--border); }
  .skill-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; font-style: italic; margin-bottom: .6rem; }
  .skill-actions { display: flex; gap: .4rem; flex-wrap: wrap; }

  /* ---- Section divider ---- */
  .section-divider { display: flex; align-items: center; gap: 1rem; margin: 2rem 0 1.2rem; }
  .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-divider span { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: .15em; color: var(--ember); text-transform: uppercase; white-space: nowrap; }

  /* ---- Ultime ---- */
  .ultimate-card { border: 1px solid var(--border); border-radius: 4px; background: var(--bg-ult); cursor: pointer; transition: border-color .2s; overflow: hidden; }
  .ultimate-card:hover       { border-color: var(--gold); }
  .ultimate-card.locked-card { opacity: .55; }
  .ultimate-card.unlocked    { border-color: var(--gold); }
  .ultimate-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; background: var(--bg-ult-hdr); }
  .ultimate-gem { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--gold); background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .ultimate-card.locked-card .ultimate-gem { border-color: var(--border-light); }
  .ultimate-info { flex: 1; }
  .ultimate-title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; color: var(--gold-light); letter-spacing: .04em; }
  .ultimate-card.locked-card .ultimate-title { color: var(--text-dim); }
  .ultimate-sub { font-size: 12.5px; color: var(--text-muted); font-style: italic; margin-top: 2px; }
  .ultimate-toggle { font-size: 12px; color: var(--text-dim); transition: transform .3s; }
  .ultimate-card.open .ultimate-toggle { transform: rotate(180deg); color: var(--gold); }
  .ultimate-detail { max-height: 0; overflow: hidden; padding: 0 16px; border-top: 0 solid transparent; transition: max-height .4s cubic-bezier(.4,0,.2,1), padding .3s; }
  .ultimate-detail.open { max-height: 220px; padding: 12px 16px 16px; border-top: 1px solid var(--border); }
  .ultimate-desc { font-size: 14.5px; color: var(--text-muted); line-height: 1.7; font-style: italic; }

  /* ---- Progression ---- */
  .progression-section { margin-top: 2.5rem; }
  .prog-timeline { display: flex; flex-direction: column; gap: 0; }
  .prog-level { display: grid; grid-template-columns: 56px 1px 1fr; gap: 0 1rem; position: relative; }
  .prog-num { display: flex; flex-direction: column; align-items: center; padding-top: 14px; }
  .prog-circle { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-light); background: var(--prog-node); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 11px; color: var(--text-muted); flex-shrink: 0; transition: background .2s, border-color .2s, color .2s; position: relative; z-index: 1; }
  .prog-level.reached  .prog-circle { border-color: var(--ember); color: var(--ember-light); background: var(--prog-done); }
  .prog-level.chosen   .prog-circle { background: var(--ember); border-color: var(--ember-light); color: #fff; }
  .prog-level.is-one   .prog-circle { background: var(--gold); border-color: var(--gold-light); color: var(--bg); }
  .prog-line-col { display: flex; justify-content: center; }
  .prog-line { width: 1px; background: var(--border); flex: 1; }
  .prog-level:last-child .prog-line { display: none; }
  .prog-level.reached  .prog-line,
  .prog-level.chosen   .prog-line  { background: var(--ember); opacity: .4; }
  .prog-content { padding: 10px 0 16px; border-bottom: 1px solid var(--border); }
  .prog-level:last-child .prog-content { border-bottom: none; }
  .prog-lvl-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: .14em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
  .prog-level.reached .prog-lvl-label,
  .prog-level.chosen  .prog-lvl-label { color: var(--ember); }
  .prog-level.is-one  .prog-lvl-label { color: var(--gold); }
  .prog-base { font-size: 13px; color: var(--text-muted); font-style: italic; line-height: 1.6; }
  .prog-options { display: flex; gap: 8px; flex-wrap: wrap; }
  .prog-option { border: 1px solid var(--border-light); border-radius: 3px; padding: 6px 10px; cursor: pointer; font-size: 12.5px; color: var(--text-muted); background: var(--prog-node); transition: border-color .15s, color .15s, background .15s; display: flex; align-items: center; gap: 6px; line-height: 1.35; }
  .prog-option:hover { border-color: var(--ember); color: var(--text); background: var(--bg3); }
  .prog-option.chosen { border-color: var(--ember); background: var(--prog-done); color: var(--gold-light); cursor: default; }
  .prog-option.unchosen { opacity: .35; cursor: default; }
  .prog-option.unchosen:hover { border-color: var(--border-light); color: var(--text-muted); background: var(--prog-node); }
  .prog-level:not(.reached):not(.chosen) .prog-option { opacity: .4; cursor: not-allowed; }
  .prog-level:not(.reached):not(.chosen) .prog-option:hover { border-color: var(--border-light); color: var(--text-muted); background: var(--prog-node); }
  .prog-option-icon { font-size: 14px; flex-shrink: 0; }
  .prog-option-text { display: flex; flex-direction: column; gap: 1px; }
  .prog-option-title { font-weight: 500; font-size: 13px; }
  .prog-option-detail { font-size: 11px; color: var(--text-dim); font-style: italic; }
  .prog-option.chosen .prog-option-detail { color: var(--text-muted); }
  .prog-or { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: .1em; color: var(--text-dim); align-self: center; text-transform: uppercase; }
  .prog-revoke { font-size: 10px; color: var(--text-dim); cursor: pointer; border: none; background: none; padding: 0; margin-left: 4px; font-family: 'Crimson Pro', serif; font-style: italic; transition: color .15s; }
  .prog-revoke:hover { color: #c06060; }

  /* ---- Footer ---- */
  .footer-note { margin-top: 3rem; text-align: center; font-size: 12px; color: var(--text-dim); font-style: italic; }

  /* ---- Responsive ---- */
  @media (max-width: 540px) {
    .tree { grid-template-columns: 1fr; }
    .class-title { font-size: 1.8rem; }
    .prog-options { flex-direction: column; }
  }

  @keyframes ember-pulse {
    0%, 100% { box-shadow: none; }
    50%       { box-shadow: 0 0 8px 1px rgba(200,98,42,.25); }
  }
  .skill-card.just-unlocked { animation: ember-pulse .8s ease-out; }
</style>
</head>
<body>
<div class="container">

  <div class="top-nav">
    <a class="back-link" id="back-link" href="index.html">← Toutes les classes</a>
    <button class="theme-toggle" onclick="toggleTheme()">☀ Thème clair</button>
  </div>

  <header class="header">
    <div class="class-label">Classe</div>
    <h1 class="class-title"><span id="class-article"></span> <span id="class-name"></span> <span class="class-level-badge" id="class-level"></span></h1>
    <p class="class-subtitle" id="class-subtitle"></p>
  </header>

  <div class="level-bar" id="level-bar"></div>

  <div class="save-bar">
    <button class="btn" onclick="exportSave()">⬇ Exporter</button>
    <label class="btn" for="import-input" style="cursor:pointer">⬆ Importer</label>
    <input type="file" id="import-input" accept=".json" onchange="importSave(this)">
    <span class="save-status" id="save-status"></span>
  </div>

  <div class="tree" id="tree"></div>

  <div class="ultimate-section">
    <div class="section-divider"><span>✦ Compétence ultime — Niveau 6 ✦</span></div>
    <div class="ultimate-card" id="ultimate-card" onclick="toggleUltimate()">
      <div class="ultimate-header">
        <div class="ultimate-gem">⚜️</div>
        <div class="ultimate-info">
          <div class="ultimate-title" id="ultimate-title"></div>
          <div class="ultimate-sub"   id="ultimate-sub"></div>
        </div>
        <div class="ultimate-toggle">▾</div>
      </div>
      <div class="ultimate-detail" id="ultimate-detail">
        <p class="ultimate-desc" id="ultimate-desc"></p>
        <div class="skill-actions" id="ultimate-actions"></div>
      </div>
    </div>
  </div>

  <div class="progression-section">
    <div class="section-divider"><span>✦ Progression par niveau ✦</span></div>
    <div class="prog-timeline" id="prog-timeline"></div>
  </div>

  <p class="footer-note">
    Cliquez sur une option de progression pour enregistrer le choix ·
    Cliquez sur une compétence pour lire sa description ·
    La compétence ultime se débloque au niveau&nbsp;6
  </p>

</div>

<script src="arbre.js"></script>
</body>
</html>
