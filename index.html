<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Royaume de Givre — Personnages</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="index.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="theme.js"></script>
<script src="player-data.js"></script>
</head>
<body>
<h1 class="site-title">Le Royaume de Givre</h1>
<div class="ornament">✦ ✦ ✦</div>
<p class="site-sub">Personnages</p>

<div class="divider"><span>Choisir un joueur</span></div>

<div class="classes-grid" id="players-grid">
  <!-- Généré par JS -->
</div>

<div class="divider"><span>Pages de référence</span></div>

<div class="sheet-card-wrap">
  <a class="class-card no-anim" href="feuille.html">
    <div class="class-card-icon">📜</div>
    <div class="class-card-info">
      <div class="class-card-name">Feuille générique</div>
      <div class="class-card-ambiance">Ancienne feuille autonome, conservée comme référence pendant la refonte.</div>
    </div>
  </a>
</div>

<button class="theme-btn" onclick="toggleTheme()">☾ Thème sombre</button>

<p class="footer-note">Cliquez sur un joueur pour ouvrir sa page de personnage intégrée</p>

<script>
function getSavedPlayer(playerId) {
  try {
    const raw = localStorage.getItem(`personnage_${playerId}`);
    return raw ? JSON.parse(raw) : null;
  } catch {
    return null;
  }
}

function buildGrid() {
  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';

  PLAYERS.forEach(player => {
    const saved = getSavedPlayer(player.id);
    const characterName = saved?.nom || player.personnage;
    const classId = saved?.classeId || player.classeId;
    const classMeta = getClassMeta(classId);

    const card = document.createElement('a');
    card.className = 'class-card';
    card.href = `player.html?id=${player.id}`;

    card.innerHTML = `
      <div class="class-card-icon">
        <img src="${classMeta.icone}" alt="${classMeta.nom}"
             onerror="this.style.display='none';this.parentElement.textContent='✦'">
      </div>
      <div class="class-card-info">
        <div class="class-card-name">${player.label}</div>
        <div class="class-card-ambiance">${characterName} · ${classMeta.article} ${classMeta.nom}</div>
      </div>
    `;

    grid.appendChild(card);
  });
}

buildGrid();
</script>
</body>
</html>
