<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Royaume de Givre — Arbres de compétences</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, [data-theme="dark"] {
    --bg:         #0d0b09;
    --bg2:        #181410;
    --bg3:        #211d17;
    --border:     #362e24;
    --border-h:   #5a4a38;
    --ember:      #c8622a;
    --ember-l:    #e07840;
    --gold:       #c9a84c;
    --gold-l:     #e2c06a;
    --text:       #e8dfd0;
    --text-m:     #8a7d6e;
    --text-d:     #4a4035;
  }
  [data-theme="light"] {
    --bg:         #f0ebe0;
    --bg2:        #e8e0d0;
    --bg3:        #ddd4c0;
    --border:     #c0aa88;
    --border-h:   #907050;
    --ember:      #a84e1a;
    --ember-l:    #c06020;
    --gold:       #8a6820;
    --gold-l:     #6a4e10;
    --text:       #2a2018;
    --text-m:     #5a4a30;
    --text-d:     #9a8a6a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    transition: background .3s, color .3s;
    position: relative;
    overflow-x: hidden;
  }

  /* Fond texturé */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(200,98,42,.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(201,168,76,.05) 0%, transparent 60%),
      radial-gradient(circle at 1px 1px, rgba(255,255,255,.012) 1px, transparent 0);
    background-size: 100% 100%, 100% 100%, 4px 4px;
  }
  [data-theme="light"] body::before {
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(168,78,26,.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(138,104,32,.06) 0%, transparent 60%),
      radial-gradient(circle at 1px 1px, rgba(0,0,0,.04) 1px, transparent 0);
    background-size: 100% 100%, 100% 100%, 4px 4px;
  }

  /* Séparateurs décoratifs */
  .ornament {
    font-size: 14px;
    letter-spacing: .5em;
    color: var(--ember);
    opacity: .6;
    margin-bottom: 1rem;
    animation: fadeIn .8s ease both;
  }

  /* Titre */
  .site-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2rem, 8vw, 3.8rem);
    font-weight: 700;
    letter-spacing: .06em;
    
    line-height: 1;
    color: var(--gold-l);
    margin-bottom: .4rem;
    animation: fadeIn .8s .1s ease both;
    position: relative;
    z-index: 1;
  }

  .site-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(.65rem, 2vw, .85rem);
    letter-spacing: .28em;
    color: var(--text-m);
    text-transform: uppercase;
    
    margin-bottom: 3rem;
    animation: fadeIn .8s .2s ease both;
  }

  /* Ligne décorative */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    max-width: 560px;
    margin-bottom: 2.5rem;
    animation: fadeIn .8s .25s ease both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border));
  }
  .divider::after { background: linear-gradient(to left, transparent, var(--border)); }
  .divider span {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: .2em;
    color: var(--ember);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Grille de classes */
  .classes-grid {
    display: flex;
    flex-direction: column;
    gap: .8rem;
    width: 100%;
    max-width: 480px;
    margin-bottom: 3rem;
  }

  /* Carte de classe */
  .class-card {
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg2);
    text-decoration: none;
    color: inherit;
    padding: 1rem 1.2rem;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 1.1rem;
    transition: border-color .2s, background .2s, transform .2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    animation: fadeIn .8s ease both;
  }
  .class-card:nth-child(1) { animation-delay: .3s; }
  .class-card:nth-child(2) { animation-delay: .4s; }
  .class-card:nth-child(3) { animation-delay: .5s; }
  .class-card:nth-child(4) { animation-delay: .6s; }

  .class-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(200,98,42,.07) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .3s;
  }
  .class-card:hover {
    border-color: var(--ember);
    background: var(--bg3);
    transform: translateY(-2px);
  }
  .class-card:hover::before { opacity: 1; }

  .class-card-icon {
    width: 56px;
    height: 56px;
    border-radius: 4px;
    border: 1px solid var(--border-h);
    background: var(--bg3);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    transition: border-color .2s;
    flex-shrink: 0;
  }
  .class-card-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .class-card:hover .class-card-icon { border-color: var(--ember); }

  .class-card-name {
    font-family: 'Cinzel', serif;
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: .08em;
    color: var(--gold);
    
    transition: color .2s;
  }
  .class-card:hover .class-card-name { color: var(--gold-l); }

  .class-card-ambiance {
    font-size: 12.5px;
    color: var(--text-m);
    font-style: italic;
    
    line-height: 1.5;
    opacity: .8;
  }

  /* Badge de progression */
  .class-card-progress {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: .12em;
    color: var(--ember);
    text-transform: uppercase;
    border: 1px solid var(--ember);
    border-radius: 2px;
    padding: 2px 8px;
    opacity: .7;
    transition: opacity .2s;
  }
  .class-card:hover .class-card-progress { opacity: 1; }

  /* Placeholder classe non définie */
  .class-card.placeholder {
    border-style: dashed;
    opacity: .4;
    cursor: default;
    pointer-events: none;
  }
  .class-card.placeholder:hover { transform: none; border-color: var(--border); background: var(--bg2); }

  /* Bouton thème */
  .theme-btn {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid var(--border-h);
    background: transparent;
    color: var(--text-m);
    transition: all .15s;
    animation: fadeIn .8s .7s ease both;
  }
  .theme-btn:hover { border-color: var(--ember); color: var(--ember-l); }

  .footer-note {
    margin-top: 2rem;
    font-size: 11.5px;
    color: var(--text-d);
    font-style: italic;
    
    animation: fadeIn .8s .8s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 400px) {
    .classes-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<h1 class="site-title">Le Royaume de Givre</h1>
<div class="ornament">✦ ✦ ✦</div>
<p class="site-sub">Arbres de compétences</p>

<div class="divider"><span>Choisir une classe</span></div>

<div class="classes-grid" id="classes-grid">
  <!-- Généré par JS -->
</div>

<div class="divider"><span>Feuille de personnage</span></div>

<div style="width:100%;max-width:480px;margin-bottom:3rem;animation:fadeIn .8s .65s ease both;">
  <a class="class-card" href="feuille.html" style="animation:none;">
    <div class="class-card-icon">📜</div>
    <div class="class-card-info">
      <div class="class-card-name">Feuille de personnage</div>
      <div class="class-card-ambiance">Caractéristiques, points de vie, progression de niveau.</div>
    </div>
  </a>
</div>

<button class="theme-btn" onclick="toggleTheme()">☾ Thème sombre</button>

<p class="footer-note">Cliquez sur une classe pour ouvrir son arbre de compétences</p>

<script>
// ============================================================
//  CONFIGURATION : ajoutez / modifiez vos classes ici
// ============================================================
const CLASSES = [
 {
    id:       'forgeron',
    nom:      'Forgeron',
    article:  'Le',
    ambiance: 'Maître artisan capable de forger et modifier des armes et des armures.',
    icone:    'forgeron/branche1.webp'
 },    
 {
    id:       'guerrier',
    nom:      'Guerrier',
    article:  'Le',
    ambiance: 'Rompu au combat avec toutes sortes d\'armes comme à mains nues, au commandement et à la stratégie militaire.',
    icone:    'guerrier/branche2.webp'
 },
 {
    id:       'mineur',
    nom:      'Mineur',
    article:  'Le',
    ambiance: 'Puissant ouvrier habitué des galeries souterraines et des gobelins qui les infestent.',
    icone:    'mineur/branche2.webp'
 },
 {
    id:       'trappeur',              // nom du dossier
    nom:      'Trappeur',
    article:  'Le',
    ambiance: 'Maître de la survie dans les montagnes et de la chasse au moyen de pièges ingénieux.',
    icone:    'trappeur/branche1.webp' // image à afficher sur la carte (optionnel)
 },
];

// ============================================================

function getProgress(classeId) {
  try {
    const raw = localStorage.getItem(`arbre_${classeId}`);
    if (!raw) return null;
    const data = JSON.parse(raw);
    return data.playerLevel ?? null;
  } catch { return null; }
}

function buildGrid() {
  const grid = document.getElementById('classes-grid');
  grid.innerHTML = '';

  CLASSES.forEach(cls => {
    const lvl = getProgress(cls.id);
    const card = document.createElement('a');
    card.className = 'class-card';
    card.href = `arbre.html?classe=${cls.id}`;

    card.innerHTML = `
      <div class="class-card-icon">
        <img src="${cls.icone}" alt="${cls.nom}"
             onerror="this.style.display='none';this.parentElement.textContent='⚔'">
      </div>
      <div class="class-card-info">
        <div class="class-card-name">${cls.article} ${cls.nom}</div>
        <div class="class-card-ambiance">${cls.ambiance}</div>
        ${lvl ? `<div class="class-card-progress">Niveau ${lvl}</div>` : ''}
      </div>
    `;

    grid.appendChild(card);
  });
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.querySelector('.theme-btn').textContent = isDark ? '☾ Thème sombre' : '☀ Thème clair';
  localStorage.setItem('theme_preference', html.dataset.theme);
}

// Synchronisation thème avec arbre.html
const savedTheme = localStorage.getItem('theme_preference');
if (savedTheme) {
  document.documentElement.dataset.theme = savedTheme;
  document.querySelector('.theme-btn').textContent = savedTheme === 'light' ? '☾ Thème sombre' : '☀ Thème clair';
}

buildGrid();
</script>
</body>
</html>
